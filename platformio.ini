; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:watchy_20]
platform = espressif32@6.9.0
board = esp32doit-devkit-v1
framework = arduino
board_build.partitions = no_ota.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
extra_scripts = 
	scripts/merge.py
lib_deps = 
	zinggjm/GxEPD2@1.6.5
	lvgl/lvgl@9.4.0
	fbiego/ChronosESP32@1.8.2
	lewisxhe/SensorLib@0.3.2
	bblanchon/ArduinoJson@7.4.2
	lennarthennigs/Button2@2.4.1
	fbiego/Timber@1.1.0
build_flags = 
	-D LV_CONF_SKIP
	-D LV_CONF_INCLUDE_SIMPLE
	-D LV_LVGL_H_INCLUDE_SIMPLE
	-D LV_USE_OBJ_NAME=1
	-D LV_COLOR_DEPTH=1
	-D UI_SUBJECT_STRING_LENGTH=64
	-D LV_USE_STDLIB_MALLOC=LV_STDLIB_CLIB
	-D LV_USE_LOG=1
	-D LV_USE_QRCODE=1
	-D LV_USE_FS_ARDUINO_ESP_LITTLEFS=1
	-D LV_FS_ARDUINO_ESP_LITTLEFS_LETTER=67 ; 'C'
	-D LV_FS_ARDUINO_ESP_LITTLEFS_PATH=\"/lvgl\"
	-D LV_USE_XML=1
	-D LV_USE_TRANSLATION=1
